<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公文管理系统 - 新建公文</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/common.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header class="header">
            <div class="logo">公文管理系统</div>
            <div class="user-info">
                <div class="user-avatar" th:text="${user.realName.charAt(0)}"></div>
                <div class="user-details">
                    <span class="user-name">[[${user.realName}]]</span>
                    <span class="user-role" th:text="${user.role == 'ADMIN' ? '管理员' : '普通用户'}"></span>
                </div>
                <div class="user-dropdown">
                    <a href="/change-password" class="user-dropdown-item">
                        <i>🔑</i> 修改密码
                    </a>
                    <a href="/logout" class="user-dropdown-item">
                        <i>🚪</i> 退出登录
                    </a>
                </div>
            </div>
        </header>
        
        <nav class="sidebar">
            <ul>
                <li><a href="/dashboard">首页</a></li>
                <li><a href="/documents">全部公文</a></li>
                <li><a href="/documents/my">我的公文</a></li>
                <li><a href="/documents/create">新建公文</a></li>
            </ul>
        </nav>
        
        <main class="main-content">
            <div class="page-header">
                <h2>新建公文</h2>
                <a href="/documents/my" class="btn btn-secondary">返回列表</a>
            </div>
            
            <form th:object="${documentRequest}" action="/documents/create" method="post" class="document-form">
                <div class="form-group">
                    <label for="title">标题 *</label>
                    <input type="text" id="title" th:field="*{title}" required maxlength="200">
                </div>
                <div class="form-group">
                    <label for="documentNo">文号</label>
                    <input type="text" id="documentNo" th:field="*{documentNo}" maxlength="50">
                </div>
                <div class="form-group">
                    <label for="type">类型</label>
                    <select id="type" th:field="*{type}">
                        <option value="">请选择类型</option>
                        <option value="通知">通知</option>
                        <option value="报告">报告</option>
                        <option value="请示">请示</option>
                        <option value="批复">批复</option>
                        <option value="函">函</option>
                        <option value="决定">决定</option>
                        <option value="命令">命令</option>
                        <option value="公告">公告</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="priority">优先级</label>
                    <select id="priority" th:field="*{priority}">
                        <option value="NORMAL">普通</option>
                        <option value="HIGH">高</option>
                        <option value="LOW">低</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="content">内容</label>
                    <textarea id="content" th:field="*{content}" rows="10" maxlength="5000"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存草稿</button>
                    <button type="button" class="btn btn-secondary">预览</button>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
