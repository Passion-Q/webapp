<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公文管理系统 - 公文详情</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/common.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header class="header">
            <div class="logo">公文管理系统</div>
            <div class="user-info">
                <div class="user-avatar" th:text="${user.realName.charAt(0)}"></div>
                <div class="user-details">
                    <span class="user-name">[[${user.realName}]]</span>
                    <span class="user-role" th:text="${user.role == 'ADMIN' ? '管理员' : '普通用户'}"></span>
                </div>
                <div class="user-dropdown">
                    <a href="/change-password" class="user-dropdown-item">
                        <i>🔑</i> 修改密码
                    </a>
                    <a href="/logout" class="user-dropdown-item">
                        <i>🚪</i> 退出登录
                    </a>
                </div>
            </div>
        </header>
        
        <nav class="sidebar">
            <ul>
                <li><a href="/dashboard">首页</a></li>
                <li><a href="/documents">全部公文</a></li>
                <li><a href="/documents/my">我的公文</a></li>
                <li><a href="/documents/create">新建公文</a></li>
            </ul>
        </nav>
        
        <main class="main-content">
            <div class="page-header">
                <h2>公文详情</h2>
                <a href="/documents/my" class="btn btn-secondary">返回列表</a>
            </div>
            
            <div class="document-detail">
                <div class="detail-header">
                    <h1 th:text="${document.title}"></h1>
                    <div class="detail-meta">
                        <span class="meta-item">文号: <span th:text="${document.documentNo} ?: '-'"></span></span>
                        <span class="meta-item">类型: <span th:text="${document.type} ?: '-'"></span></span>
                        <span class="meta-item">状态: <span class="status-tag" th:text="${document.status}"></span></span>
                        <span class="meta-item">优先级: <span th:text="${document.priority}"></span></span>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>正文内容</h3>
                    <div class="content-area" th:text="${document.content} ?: '暂无内容'"></div>
                </div>
                
                <div class="detail-section" th:if="${user.role == 'ADMIN' || document.creator.id == user.id}">
                    <h3>审批流程</h3>
                    <div class="process-timeline">
                        <div class="timeline-item">
                            <div class="timeline-status done">✓</div>
                            <div class="timeline-info">
                                <div class="timeline-title">创建</div>
                                <div class="timeline-desc" th:text="${document.creator.realName} + ' 创建于 ' + ${#temporals.format(document.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                            </div>
                        </div>
                        <div class="timeline-item" th:if="${document.status != 'DRAFT'}">
                            <div class="timeline-status" th:class="${document.status == 'PENDING_REVIEW' ? 'pending' : 'done'}">✓</div>
                            <div class="timeline-info">
                                <div class="timeline-title">提交审核</div>
                                <div class="timeline-desc" th:text="'已提交'"></div>
                            </div>
                        </div>
                        <div class="timeline-item" th:if="${document.status == 'APPROVED' || document.status == 'REJECTED'}">
                            <div class="timeline-status done">✓</div>
                            <div class="timeline-info">
                                <div class="timeline-title">审核</div>
                                <div class="timeline-desc">
                                <span th:text="${document.reviewer?.realName}"></span>
                                <span th:if="${document.reviewComment != null && !document.reviewComment.isEmpty()}"> - <span th:text="${document.reviewComment}"></span></span>
                            </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="detail-actions">
                    <a th:if="${document.status == 'DRAFT' && document.creator.id == user.id}" th:href="@{/documents/{id}/submit(id=${document.id})}" class="btn btn-primary">提交审核</a>
                    <a th:if="${user.role == 'ADMIN' && document.status == 'PENDING_REVIEW'}" th:href="@{/documents/{id}/review(id=${document.id})}" class="btn btn-warning">审核</a>
                    <button class="btn btn-secondary">打印</button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
