<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 公文管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/common.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header class="header">
            <div class="logo">公文管理系统</div>
            <div class="user-info">
                <div class="user-avatar" th:text="${user.realName.charAt(0)}"></div>
                <div class="user-details">
                    <span class="user-name">[[${user.realName}]]</span>
                    <span class="user-role" th:text="${user.role == 'ADMIN' ? '管理员' : '普通用户'}"></span>
                </div>
                <div class="user-dropdown">
                    <a href="/change-password" class="user-dropdown-item">
                        <i>🔑</i> 修改密码
                    </a>
                    <a href="/logout" class="user-dropdown-item">
                        <i>🚪</i> 退出登录
                    </a>
                </div>
            </div>
        </header>
        
        <nav class="sidebar">
            <ul>
                <li><a href="/dashboard">首页</a></li>
                <li><a href="/documents">全部公文</a></li>
                <li><a href="/documents/my">我的公文</a></li>
                <li><a href="/documents/create">新建公文</a></li>
            </ul>
        </nav>
        
        <main class="main-content">
            <div class="page-header">
                <h2>修改密码</h2>
            </div>
            
            <div class="change-password-container">
                <form th:action="@{/change-password}" method="post" th:object="${changePasswordRequest}">
                    <div class="form-group">
                        <label for="oldPassword">旧密码</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="oldPassword" th:field="*{oldPassword}" class="form-control" 
                                   placeholder="请输入旧密码" autocomplete="off"
                                   oncopy="return false;" oncut="return false;" onpaste="return false;">
                            <button type="button" class="password-toggle" onclick="togglePassword('oldPassword')">👁</button>
                        </div>
                        <span th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}" class="text-danger"></span>
                    </div>

                    <div class="form-group">
                        <label for="newPassword">新密码</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control" 
                                   placeholder="请输入新密码" autocomplete="off"
                                   oncopy="return false;" oncut="return false;" onpaste="return false;">
                            <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">👁</button>
                        </div>
                        <span th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}" class="text-danger"></span>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">确认新密码</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control" 
                                   placeholder="请再次输入新密码" autocomplete="off"
                                   oncopy="return false;" oncut="return false;" onpaste="return false;">
                            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">👁</button>
                        </div>
                        <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="text-danger"></span>
                    </div>

                    <div class="password-rules">
                        <small>密码要求：至少8位，包含大写字母、小写字母、数字和特殊字符</small>
                    </div>

                    <div th:if="${error}" class="alert alert-danger">
                        <span th:text="${error}"></span>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">确认修改</button>
                        <a href="/dashboard" class="btn btn-secondary">取消</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        function togglePassword(fieldId) {
            var input = document.getElementById(fieldId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }
        
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) {
                e.preventDefault();
            }
            if ((e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'V')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
