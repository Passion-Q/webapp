<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公文管理系统 - 登录</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>公文管理系统</h1>
            <p class="subtitle">Document Management System</p>
            
            <form th:object="${loginRequest}" action="/login/submit" method="post" oncontextmenu="return false;">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" th:field="*{username}" required 
                           oncopy="return false;" oncut="return false;" onpaste="return false;" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" th:field="*{password}" required 
                               oncopy="return false;" oncut="return false;" onpaste="return false;" autocomplete="off">
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">👁</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">登录</button>
            </form>
            
            <div class="login-links">
                <a href="/reset-password" class="forgot-password">忘记密码？</a>
                <a href="/register" class="register-link">立即注册</a>
            </div>
            
            <div th:if="${param.error}" class="error-message">
                <span th:text="${session.errorMessage != null ? session.errorMessage : '用户名或密码错误'}"></span>
            </div>
            <div th:if="${param.registered}" class="success-message">
                注册成功，请登录
            </div>
            <div th:if="${param.resetSuccess}" class="success-message">
                密码重置成功，请登录
            </div>
            <div th:if="${param.passwordChanged}" class="success-message">
                密码修改成功，请使用新密码登录
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword(fieldId) {
            var input = document.getElementById(fieldId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }
        
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) {
                e.preventDefault();
            }
            if ((e.ctrlKey || e.metaKey) && (e.key === 'x' || e.key === 'X')) {
                e.preventDefault();
            }
            if ((e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'V')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
