<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码重置 - 公文管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>🔐 密码重置</h1>
                <p>请输入用户名和新密码</p>
            </div>

            <form th:action="@{/reset-password}" method="post" th:object="${resetPasswordRequest}">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="请输入用户名">
                    <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger"></span>
                </div>

                <div class="form-group">
                    <label for="newPassword">新密码</label>
                    <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control" 
                           placeholder="请输入新密码" autocomplete="off">
                    <span th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}" class="text-danger"></span>
                </div>

                <div class="password-rules">
                    <small>密码要求：至少8位，包含大写字母、小写字母、数字和特殊字符</small>
                </div>

                <button type="submit" class="btn btn-primary">重置密码</button>

                <div th:if="${error}" class="alert alert-danger mt-3">
                    <span th:text="${error}"></span>
                </div>
            </form>

            <div class="login-footer">
                <a href="/login">← 返回登录</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) {
                e.preventDefault();
            }
            if ((e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'V')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
